<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pre-send Check</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            padding: 20px;
            color: #333;
        }

        h3 {
            border-bottom: 2px solid #0078d4;
            padding-bottom: 10px;
            margin-top: 0;
        }

        .section {
            margin-bottom: 20px;
            border: 1px solid #e1dfdd;
            padding: 10px;
            border-radius: 4px;
        }

        .section-title {
            font-weight: bold;
            margin-bottom: 10px;
            background: #f3f2f1;
            padding: 5px;
        }

        .item-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            padding: 5px;
        }

        .external-tag {
            color: #d13438;
            border: 1px solid #d13438;
            padding: 1px 4px;
            font-size: 10px;
            margin-left: 5px;
        }

        .btn-container {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #btnSend {
            background-color: #0078d4;
            color: white;
            opacity: 0.5;
        }

        #btnSend.active {
            opacity: 1;
        }

        #btnCancel {
            background-color: #fff;
            border: 1px solid #888;
        }

        /* 【新增】除錯控制台樣式 */
        #debug-console {
            margin-top: 30px;
            padding: 15px;
            background-color: #1e1e1e;
            color: #00ff00;
            /* 駭客綠 */
            font-family: 'Courier New', monospace;
            font-size: 12px;
            height: 200px;
            overflow-y: auto;
            border: 2px solid #d13438;
            border-radius: 5px;
            word-wrap: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

    <h3>🛡️ Pre-send Checklist (Debug)</h3>

    <div class="section">
        <div class="section-title">Recipients</div>
        <div id="recipients-list">Waiting for data...</div>
    </div>

    <div class="section">
        <div class="section-title">Attachments</div>
        <div id="attachments-list">Waiting for data...</div>
    </div>

    <div class="btn-container">
        <button id="btnCancel">Cancel</button>
        <button id="btnSend" disabled>Confirm and Send</button>
    </div>

    <div id="debug-console">
        > Debugger initialized...<br>
    </div>

    <script src="dialog.js"></script>
</body>

</html>
